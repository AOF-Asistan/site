<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AÖF Asistan — Çıkmış sorularla sınava hazırlan</title>
<meta name="description" content="AÖF Asistan: Açıköğretim'in 400.000'den fazla çıkmış sorusunu gerçek sınav arayüzüyle çöz, yanlışlarını yapay zekâya sor.">
<style>
  :root { --bg:#051424; --metin:#eaf2fb; --ikincil:#7c93ab; --border:#1d2c3d; --aksan:#6C63FF; --aksan-yumusak:#c4c0ff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--metin); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; text-align:center; }
  .etiket { font-size:12px; font-weight:700; letter-spacing:4px; color:var(--ikincil); margin-bottom:10px; }
  h1 { font-size:44px; font-weight:800; letter-spacing:-1px; margin-bottom:14px; }
  h1 .vurgu { color:var(--aksan-yumusak); }
  .alt { font-size:17px; color:var(--ikincil); line-height:1.6; max-width:480px; margin-bottom:28px; }
  .rozet { display:inline-block; background:rgba(108,99,255,.14); border:1px solid rgba(108,99,255,.35); color:var(--aksan-yumusak);
           border-radius:99px; padding:8px 18px; font-size:14px; font-weight:600; margin-bottom:40px; }
  footer { display:flex; gap:22px; flex-wrap:wrap; justify-content:center; font-size:14px; }
  footer a { color:var(--ikincil); text-decoration:none; border-bottom:1px solid var(--border); padding-bottom:2px; }
  footer a:hover { color:var(--aksan-yumusak); }
</style>
</head>
<body>
  <div class="etiket">AÇIKÖĞRETİM</div>
  <h1>AÖF <span class="vurgu">Asistan</span></h1>
  <p class="alt">400.000'den fazla çıkmış soruyu gerçek sınav arayüzüyle çöz, yanlışlarını Asistan'a sor, anında anla.</p>
  <div class="rozet">📱 Yakında App Store'da</div>
  <footer>
    <a href="/gizlilik/">Gizlilik Politikası</a>
    <a href="/destek/">Destek</a>
    <a href="mailto:info@aofasistan.com">info@aofasistan.com</a>
  </footer>
</body>
</html>
